name: daily_sales_plan_tracker
description: "Empower retail sales teams with \"Daily Sales Plan Tracker,\" an intuitive, offline Android app that transforms KPI tracking into a delightful daily ritual, making complex sales data easy to understand and act upon."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  uuid: ^4.0.0
  intl: 0.20.2
  shared_preferences: ^2.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  remove_alpha_ios: true
  
